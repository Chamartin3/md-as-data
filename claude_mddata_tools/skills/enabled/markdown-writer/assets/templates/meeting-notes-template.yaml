parameters:
  meeting_title:
    type: str
    required: true
    default: "Team Meeting"
  date:
    type: str
    required: false
    default: "{{date}}"
  attendees:
    type: str
    required: false
    default: "Not specified"
  facilitator:
    type: str
    required: false

frontmatter:
  title: "{{meeting_title}}"
  date: "{{date}}"
  type: "meeting-notes"
  attendees: "{{attendees}}"
  facilitator: "{{facilitator}}"

content:
  sections:
    - id: agenda
      title: "Agenda"
      level: 2
      content: |
        - Topic 1
        - Topic 2
        - Topic 3

    - id: discussion
      title: "Discussion"
      level: 2
      content: |
        ### Key Points

        - Point 1
        - Point 2

    - id: action_items
      title: "Action Items"
      level: 2
      content: |
        - [ ] Task 1 - @assignee - Due: YYYY-MM-DD
        - [ ] Task 2 - @assignee - Due: YYYY-MM-DD

    - id: next_meeting
      title: "Next Meeting"
      level: 2
      content: |
        Date: TBD
        Topics: TBD
