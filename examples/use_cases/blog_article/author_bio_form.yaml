parameters:
  author_name:
    type: str
    required: true
    description: "Author's full name"
  
  author_title:
    type: str
    required: true
    description: "Author's job title"
  
  author_company:
    type: str
    description: "Author's company or organization"
  
  author_bio:
    type: str
    required: true
    min: 50
    max: 300
    description: "Author biography (50-300 characters)"
  
  profile_image:
    type: str
    pattern: "^https?://.*\\.(jpg|jpeg|png|webp)$"
    description: "URL to author's profile image"
  
  social_links:
    type: array
    item_type: object
    description: "Social media links"
    items:
      platform:
        type: str
        enum: ["Twitter", "LinkedIn", "GitHub", "Website", "Email"]
        required: true
      url:
        type: str
        required: true

sections:
  author-bio:
    content: |
      ## About the Author
      
      {%- if profile_image %}
      ![{{author_name}}]({{profile_image}} "{{author_name}}")
      {%- endif %}
      
      **{{author_name}}** is {{author_title}}{%- if author_company %} at {{author_company}}{%- endif %}. {{author_bio}}
      
      {%- if social_links %}
      **Connect with {{author_name.split()[0]}}:**
      {%- for link in social_links %}
      - [{{link.platform}}]({{link.url}})
      {%- endfor %}
      {%- endif %}