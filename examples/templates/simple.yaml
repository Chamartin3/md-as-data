parameters:
  title:
    type: str
    required: true
    description: Document title
  author:
    type: str
    required: false
    default: "{env.USER}"
  date:
    type: str
    required: false
    default: "{date}"
  tags:
    type: array
    item_type: str
    required: false
    default: []

changes:
  frontmatter:
    title: "{title}"
    author: "{author}"
    date: "{date}"
    tags: "{tags}"
  sections:
    - id: introduction
      content: |
        # Introduction

        This document was created on {date} by {author}.

        ## Overview

        Welcome to {title}!
    - id: content
      content: |
        # Main Content

        Add your content here.