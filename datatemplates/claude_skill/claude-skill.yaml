# Claude Code Skill Datatemplate
# This template generates a properly formatted Claude Code skill document
# Parameters define customizable values for the template
# Required parameters enforce validation - must be provided when using template
parameters:
  # Required core parameters
  skill_name:
    type: str
    required: true
    description: "Skill name (lowercase, hyphens, max 64 chars)"
    pattern: "^[a-z0-9-]{1,64}$"
    min_length: 3
    max_length: 64
  description:
    type: str
    required: true
    description: "What the skill does and when to use it (10-1024 chars)"
    min_length: 10
    max_length: 1024
  purpose:
    type: str
    required: true
    description: "Detailed explanation of the skill's purpose and use cases (minimum 20 chars)"
    min_length: 20
  instructions:
    type: str
    required: true
    description: "Step-by-step instructions for using the skill (minimum 20 chars)"
    min_length: 20
  # Optional parameters with sensible defaults
  allowed_tools:
    type: array
    item_type: str
    required: false
    description: "List of allowed tools or ['*'] for all tools"
    default: []
    item_enum:
      - Read
      - Write
      - Edit
      - MultiEdit
      - Glob
      - Grep
      - Bash
      - WebFetch
      - WebSearch
      - Task
      - TodoWrite
      - AskUserQuestion
      - Skill
      - SlashCommand
      - BashOutput
      - KillShell
      - NotebookEdit
      - "*"
    item_enum_strict: false
    item_enum_descriptions:
      Read: "Read files from the filesystem"
      Write: "Write new files or overwrite existing files"
      Edit: "Edit files with exact string replacement"
      MultiEdit: "Edit multiple files in one operation"
      Glob: "Find files by pattern matching"
      Grep: "Search file contents with regex"
      Bash: "Execute bash commands"
      WebFetch: "Fetch and process web content"
      WebSearch: "Search the web for information"
      Task: "Launch specialized sub-agents"
      TodoWrite: "Manage task lists"
      AskUserQuestion: "Ask user for input during execution"
      Skill: "Execute other skills"
      SlashCommand: "Execute custom slash commands"
      BashOutput: "Retrieve output from background bash shells"
      KillShell: "Terminate background bash shells"
      NotebookEdit: "Edit Jupyter notebook cells"
      "*": "Allow all available tools"
  examples:
    type: str
    required: false
    description: "Usage examples demonstrating the skill (minimum 20 chars when provided)"
    default: ""
    min_length: 0
  additional_notes:
    type: str
    required: false
    description: "Any additional notes or best practices (minimum 10 chars when provided)"
    default: ""
    min_length: 0
  version:
    type: str
    required: false
    description: "Skill version (semantic versioning format)"
    default: "1.0.0"
    pattern: "^\\d+\\.\\d+\\.\\d+$"
# Frontmatter structure with template placeholders
frontmatter:
  name: "{skill_name}"
  description: "{description}"
  allowed-tools: "{allowed_tools}"
  version: "{version}"
  created: "{date}"
# Update policy for frontmatter (merge, replace, update, append)
frontmatter_policy: merge
# Document sections as array
sections:
  - id: "purpose"
    content: |
      ## Purpose
      {purpose}
    policy: update
  - id: "instructions"
    content: |
      ## Instructions
      {instructions}
    policy: update
  - id: "examples"
    content: |
      ## Examples
      {examples}
    policy: update
  - id: "notes"
    content: |
      ## Additional Notes
      {additional_notes}
    policy: update
